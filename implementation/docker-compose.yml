services:
  web:
    build:
      context: ./
      target: test
    ports:
      - "5000:5000"

    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
      - JWT_SECRET_KEY=MEGALANGTSECRET

    depends_on:
      db:
        condition: service_healthy
    #restart: unless-stopped # udkommenter denne linje hvis du kører i production
  db:
    image: postgres:17
    environment:
      FLASK_APP: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
